<!DOCTYPE html>
<html>
<head>
  <title>Loot Split Calculator</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    h2, h3 { margin-top: 20px; }

    input {
      padding: 8px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      width: 150px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
    }

    .member {
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
      margin: 8px 0;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    label {
      margin-right: 10px;
    }

    .checkbox-group {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }

    pre {
      background: #020617;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h2>Loot Split Calculator</h2>

<h3>Loot Input</h3>

<div class="row">
  <input id="itemLoot" placeholder="Item Loot">
  <input id="discount" placeholder="Discount %">
</div>

<div class="row">
  <input id="bag10k" placeholder="10k Bags">
  <input id="bag1k" placeholder="1k Bags">
  <input id="repair" placeholder="Repair">
</div>

<label>
  <input type="checkbox" id="sold"> Loot Sold (All Silver)
</label>

<br>
<input id="split" placeholder="Split Amount">

<h3>Custom Members</h3>
<div id="members"></div>

<button onclick="addMember()">+ Add Member</button>
<br>
<button onclick="calculate()">Calculate</button>

<h3>Result</h3>
<pre id="result"></pre>

<script>
// ---------- PARSE ----------
function parseNumber(value) {
  return Number((value || "").replace(/[^\d]/g, "")) || 0;
}

// ---------- FORMAT ----------
function formatInput(el) {
  let raw = el.value.replace(/[^\d]/g, "");
  el.value = raw ? Number(raw).toLocaleString("en-US") : "";
}

// format on blur only (no typing bugs)
document.addEventListener("blur", (e) => {
  if (e.target.tagName === "INPUT" && e.target.type !== "checkbox") {
    formatInput(e.target);
  }
}, true);

// ---------- EXCLUSIVE CHECKBOX ----------
function exclusive(group, current) {
  group.forEach(el => {
    if (el !== current) el.checked = false;
  });
}

// ---------- ADD MEMBER ----------
function addMember(isCaller = false) {
  const div = document.createElement("div");
  div.className = "member";

  div.innerHTML = `
    <input class="name" placeholder="${isCaller ? "Caller" : "Member"}" value="${isCaller ? "Caller" : ""}">

    <div>
      <label><input type="checkbox" class="percent"> %</label>
      <label><input type="checkbox" class="fixed"> Fixed</label>
    </div>

    <input class="value" placeholder="Value">

    <div>
      <label><input type="checkbox" class="both" checked> Both</label>
      <label><input type="checkbox" class="item"> Item</label>
      <label><input type="checkbox" class="silver"> Silver</label>
    </div>
  `;

  // enforce exclusive behavior
  const percent = div.querySelector(".percent");
  const fixed = div.querySelector(".fixed");

  percent.onclick = () => exclusive([percent, fixed], percent);
  fixed.onclick = () => exclusive([percent, fixed], fixed);

  const both = div.querySelector(".both");
  const item = div.querySelector(".item");
  const silver = div.querySelector(".silver");

  both.onclick = () => exclusive([both, item, silver], both);
  item.onclick = () => exclusive([both, item, silver], item);
  silver.onclick = () => exclusive([both, item, silver], silver);

  document.getElementById("members").appendChild(div);
}

// ---------- AUTO ADD CALLER ----------
addMember(true);

// ---------- LIVE CALC ----------
document.addEventListener("input", () => calculate());

// ---------- CALC ----------
function calculate() {
  let itemLoot = parseNumber(itemLootEl.value);
  let discount = parseNumber(discountEl.value);

  let bag10k = parseNumber(bag10kEl.value);
  let bag1k = parseNumber(bag1kEl.value);
  let repair = parseNumber(repairEl.value);

  let split = parseNumber(splitEl.value);
  let sold = soldEl.checked;

  // --- POOLS ---
  let itemPool = itemLoot * (discount ? (1 - discount / 100) : 1);
  let silverPool = (bag10k * 10000) + (bag1k * 1000) - repair;
  if (silverPool < 0) silverPool = 0;

  if (sold) {
    silverPool += itemPool;
    itemPool = 0;
  }

  let totalLoot = itemPool + silverPool;
  let baseShare = split > 0 ? totalLoot / split : 0;

  let members = document.querySelectorAll(".member");

  let itemCustom = 0;
  let silverCustom = 0;
  let results = [];

  members.forEach(m => {
    let name = m.querySelector(".name").value || "Member";

    let percent = m.querySelector(".percent").checked;
    let fixed = m.querySelector(".fixed").checked;
    let value = parseNumber(m.querySelector(".value").value);

    let both = m.querySelector(".both").checked;
    let itemOnly = m.querySelector(".item").checked;
    let silverOnly = m.querySelector(".silver").checked;

    let share = percent ? baseShare * (value / 100) : fixed ? value : 0;

    let itemShare = 0;
    let silverShare = 0;

    if (both) {
      itemShare = share * (itemPool / totalLoot || 0);
      silverShare = share * (silverPool / totalLoot || 0);
    } else if (itemOnly) {
      itemShare = share;
    } else if (silverOnly) {
      silverShare = share;
    }

    itemCustom += itemShare;
    silverCustom += silverShare;

    results.push({
      name,
      item: itemShare,
      silver: silverShare,
      total: itemShare + silverShare
    });
  });

  // --- REMAINING ---
  let itemRemain = Math.max(itemPool - itemCustom, 0);
  let silverRemain = Math.max(silverPool - silverCustom, 0);

  let remainingMembers = split - members.length;

  let callerItem = 0;
  let callerSilver = 0;

  if (remainingMembers > 0) {
    callerItem = (itemRemain / remainingMembers) * 1.1;
    callerSilver = (silverRemain / remainingMembers) * 1.1;
  }

  let itemAfterCaller = itemRemain - callerItem;
  let silverAfterCaller = silverRemain - callerSilver;

  let generalMembers = remainingMembers - 1;

  let generalItem = generalMembers > 0 ? itemAfterCaller / generalMembers : 0;
  let generalSilver = generalMembers > 0 ? silverAfterCaller / generalMembers : 0;

  // ---------- OUTPUT ----------
  let out = "";

  out += `Item Pool: ${Math.round(itemPool).toLocaleString()}\n`;
  out += `Silver Pool: ${Math.round(silverPool).toLocaleString()}\n`;
  out += `Total Loot: ${Math.round(totalLoot).toLocaleString()}\n\n`;

  results.forEach(r => {
    out += `${r.name} → ${Math.round(r.total).toLocaleString()} (Item ${Math.round(r.item).toLocaleString()} | Silver ${Math.round(r.silver).toLocaleString()})\n`;
  });

  out += `\nCaller → ${Math.round(callerItem + callerSilver).toLocaleString()}\n`;
  out += `General → ${Math.round(generalItem + generalSilver).toLocaleString()}\n`;

  resultEl.innerText = out;
}

// ---------- SHORTCUTS ----------
const itemLootEl = document.getElementById("itemLoot");
const discountEl = document.getElementById("discount");
const bag10kEl = document.getElementById("bag10k");
const bag1kEl = document.getElementById("bag1k");
const repairEl = document.getElementById("repair");
const splitEl = document.getElementById("split");
const soldEl = document.getElementById("sold");
const resultEl = document.getElementById("result");
</script>

</body>
</html>
