<!DOCTYPE html>
<html>
<head>
  <title>Loot Split Calculator</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    h2, h3 { margin-top: 20px; }

    input {
      padding: 8px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      width: 150px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
    }

    .member {
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
      margin: 8px 0;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    label {
      margin-right: 10px;
    }

    .checkbox-group {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }

    pre {
      background: #020617;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h2>Loot Split Calculator</h2>

<h3>Loot Input</h3>

<div class="row">
  <input id="itemLoot" placeholder="Item Loot">
  <input id="discount" placeholder="Discount %">
</div>

<div class="row">
  <input id="bag10k" placeholder="10k Bags">
  <input id="bag1k" placeholder="1k Bags">
  <input id="repair" placeholder="Repair">
</div>

<label>
  <input type="checkbox" id="sold"> Loot Sold (All Silver)
</label>

<br>
<input id="split" placeholder="Split Amount">

<h3>Custom Members</h3>
<div id="members"></div>

<button onclick="addMember()">+ Add Member</button>
<br>
<button onclick="calculate()">Calculate</button>

<h3>Result</h3>
<pre id="result"></pre>

<script>
// FORMAT NUMBER INPUT (1,000,000)
function formatNumber(value) {
  value = value.replace(/,/g, '');
  if (value === '') return '';
  return Number(value).toLocaleString();
}

function parseNumber(value) {
  return Number(value.replace(/,/g, '')) || 0;
}

document.addEventListener("input", (e) => {
  if (e.target.tagName === "INPUT" && e.target.type !== "checkbox") {
    let cursor = e.target.selectionStart;
    e.target.value = formatNumber(e.target.value);
  }
});

function addMember() {
  const div = document.createElement("div");
  div.className = "member";

  div.innerHTML = `
    <input class="name" placeholder="Name">

    <div class="checkbox-group">
      <label><input type="checkbox" class="percentCheck"> %</label>
      <label><input type="checkbox" class="fixedCheck"> Fixed</label>
    </div>

    <input class="value" placeholder="Value">

    <div class="checkbox-group">
      <label><input type="checkbox" class="itemOnly"> Item</label>
      <label><input type="checkbox" class="silverOnly"> Silver</label>
      <label><input type="checkbox" class="both" checked> Both</label>
    </div>
  `;

  document.getElementById("members").appendChild(div);
}

function calculate() {
  let itemLoot = parseNumber(document.getElementById("itemLoot").value);
  let discount = parseNumber(document.getElementById("discount").value) / 100;

  let bag10k = parseNumber(document.getElementById("bag10k").value);
  let bag1k = parseNumber(document.getElementById("bag1k").value);
  let repair = parseNumber(document.getElementById("repair").value);

  let split = parseNumber(document.getElementById("split").value);
  let sold = document.getElementById("sold").checked;

  let itemPrice = itemLoot * (1 - discount);
  let totalSilver = (bag10k * 10000) + (bag1k * 1000);
  let silverRemain = totalSilver - repair;

  let totalLoot = itemPrice + silverRemain;
  let baseShare = totalLoot / split;

  let members = document.querySelectorAll(".member");

  let totalCustom = 0;
  let results = [];

  members.forEach(m => {
    let name = m.querySelector(".name").value || "Member";

    let percent = m.querySelector(".percentCheck").checked;
    let fixed = m.querySelector(".fixedCheck").checked;
    let value = parseNumber(m.querySelector(".value").value);

    let share = 0;

    if (percent) {
      share = baseShare * (value / 100);
    } else if (fixed) {
      share = value;
    }

    totalCustom += share;
    results.push({ name, share });
  });

  let remainingPool = totalLoot - totalCustom;
  let remainingMembers = split - members.length;

  let callerShare = (remainingPool / remainingMembers) * 1.1;

  let remainingAfterCaller = remainingPool - callerShare;
  let generalMembers = remainingMembers - 1;

  let generalShare = generalMembers > 0 ? remainingAfterCaller / generalMembers : 0;

  let output = "";

  results.forEach(r => {
    output += `${r.name}: ${Math.round(r.share).toLocaleString()}\n`;
  });

  output += `\nCaller: ${Math.round(callerShare).toLocaleString()}\n`;
  output += `General Member: ${Math.round(generalShare).toLocaleString()}\n`;

  document.getElementById("result").innerText = output;
}
</script>

</body>
</html>
